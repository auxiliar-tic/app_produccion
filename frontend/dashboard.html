<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../frontend/css/dashboard.css">
    <title>Dashboard</title>
</head>
<body>
    <div class="layout">

        <!--MENU-->
        <nav class="sidebar">
            <img src="../frontend/imagenes/logo_fyr_blanco.png.jpeg" alt="logo_fyr">
            <h2>Menu</h2>
            <button class="sidebar__button" onclick="cargarProduccion()">Produccion</button>
            <button class="sidebar__button" onclick="cargarUsuarios()">Usuarios</button>
            <button class="sidebar__button button-salir"onclick="logout()">Salir</button>
        </nav>

        <!--CONTENIDO-->
        <div class="content" id="content">
            
            <div class="main-box">

                <h1>Bienvenido</h1>
                <h3 id="nombre"></h3>

                <div id ="tabla-container"></div>

            </div>

        </div>

        <script src="../frontend/js/api.js"></script>
        <script src="../frontend/js/dashboard.js"></script>
    </div>

    <div id="modalEditar" class="modal">
        <div class="modal_content">
             <h1>Editar Producción</h1>

              <input type="hidden" id="edit_id">

               <label>Proceso:</label>
               <select class="modal_select" id="edit_proceso"></select>

               <label>Fecha:</label>
               <input class="modal_input" type="date" id="edit_fecha">

               <div class="modal_buttons">
                    <button class="button--guardar" onclick="guardarEdicion()">Guardar</button>
                    <button class="button--cancelar" onclick="cerrarModal()">Cancelar</button>
               </div>
        </div>
</div>
 
</body>
</html>
